services:
  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: pginspect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-pgadmin}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - pginspect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pgadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Application (Frontend + Backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-30000}
    container_name: pginspect-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@database:5432/${DB_NAME:-pgadmin}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      
      # Server Configuration
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # Security
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      QUERY_TIMEOUT: ${QUERY_TIMEOUT:-30000}
      MAX_RESULT_ROWS: ${MAX_RESULT_ROWS:-1000}
      
      # Features
      ENABLE_QUERY_LOGGING: ${ENABLE_QUERY_LOGGING:-false}
      ENABLE_EXPLAIN: ${ENABLE_EXPLAIN:-true}
      
      # Clerk Authentication
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      
      # Encryption Key
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - pginspect-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  pginspect-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
